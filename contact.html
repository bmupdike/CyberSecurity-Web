  <header class="site-header">

  <main class="panel container contact-grid">
  <h2 class="center">Contact Us!</h2>

  <div class="contact-left">
    <h4>Our info</h4>
    <ul>
      <li>980-444-CYBE</li>
      <li>cyberhelpme@gmail.com</li>
    </ul>
    <h4>Subscribe to Our Newsletter</h4>
    <form action="#" class="newsletter">
      <input type="email" placeholder="you@example.com" aria-label="newsletter email">
      <button>Submit</button>
    </form>
  </div>

  <aside class="contact-right">
    <h4>Ask questions and report suspicious activity!</h4>
    <form action="#" class="contact-form">
      <label>Name<input name="name" placeholder="First name"></label>
      <label>Surname<input name="surname" placeholder="Surname"></label>
      <label>Email<input name="email" type="email" placeholder="Email"></label>
      <label>Message<textarea name="message" placeholder="Message"></textarea></label>
      <button type="submit">Submit</button>
    </form>
  </aside>
</main>
