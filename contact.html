<!doctype html>
<html lang="en">
<head>

  <!--

-->

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact Us</title>
  <link rel="stylesheet" href="css/styles.css">

</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1 class="logo">Cyber Safety</h1>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="common-threats.html">Common Online Threats</a>
        <a href="protect-yourself.html">How to Protect Yourself Online</a>
        <a href="safe-email.html">Safe Email and Web Use</a>
        <a href="contact.html">Contact Us</a>
      </nav>
    </div>
  </header>

  <main class="panel container contact-grid">

    <h2 class="center">Contact Us</h2>

    <!-- LEFT SIDE -->
    <div class="contact-left">

      <div class="card">
        <h3>Our Info</h3>
        <ul>
          <li>📞 980-444-CYBE</li>
          <li>📧 cyberhelpme@gmail.com</li>
        </ul>
      </div>

      <div class="card">
        <h3>Subscribe to Our Newsletter</h3>
        <form class="newsletter">
          <input type="email" placeholder="you@example.com" required>
          <button type="submit">Subscribe</button>
        </form>
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="contact-right">

      <form id="contactForm" class="contact-form" novalidate>

        <h3>Ask Questions or Report Suspicious Activity</h3>

        <label>
          Name
          <input type="text" id="name" placeholder="First name" required>
          <small class="error"></small>
        </label>

        <label>
          Surname
          <input type="text" id="surname" placeholder="Surname" required>
          <small class="error"></small>
        </label>

        <label>
          Email
          <input type="email" id="email" placeholder="Email" required>
          <small class="error"></small>
        </label>

        <label>
          Message
          <textarea id="message" placeholder="Message" required></textarea>
          <small class="error"></small>
        </label>

        <button type="submit">Send Message</button>

      </form>

    </div>

  </main>

  <footer class="site-footer container">
    <p>&copy; 2026 Cybersecurity</p>
  </footer>

  <!-- VALIDATION SCRIPT -->
  <script>
  const form = document.getElementById('contactForm');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    let isValid = true;

    const name = document.getElementById('name');
    const surname = document.getElementById('surname');
    const email = document.getElementById('email');
    const message = document.getElementById('message');

    // Clear previous errors
    document.querySelectorAll('.error').forEach(el => el.textContent = '');

    // Name validation
    if (name.value.trim() === '') {
      showError(name, "Name is required");
      isValid = false;
    }

    // Surname validation
    if (surname.value.trim() === '') {
      showError(surname, "Surname is required");
      isValid = false;
    }

    // Email validation
    if (!validateEmail(email.value)) {
      showError(email, "Enter a valid email");
      isValid = false;
    }

    // Message validation
    if (message.value.trim().length < 10) {
      showError(message, "Message must be at least 10 characters");
      isValid = false;
    }

    if (isValid) {
      alert("Form submitted successfully! (Demo only)");
      form.reset();
    }
  });

  function showError(input, message) {
    const error = input.parentElement.querySelector('.error');
    error.textContent = message;
  }

  function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }
  </script>

</body>
</html>
